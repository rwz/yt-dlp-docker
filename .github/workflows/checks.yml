name: checks
on:
  push:
    branches: [main]
    paths:
      - shell/**
      - test/**
      - .github/workflows/checks.yml
  pull_request:
    paths:
      - shell/**
      - test/**
      - .github/workflows/checks.yml

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest   # shellcheck is preinstalled on the runner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: ShellCheck
        run: shellcheck shell/yt-dlp-docker.sh test/script_test.sh test/smoke.sh

      - name: Script tests
        run: bash test/script_test.sh
