name: build
on:
  schedule:
    - cron: "30 3 * * *"   # daily, after yt-dlp nightly publishes (~23:59 UTC)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - test/smoke.sh
      - .github/workflows/build.yml

# Serialize publishes so overlapping runs don't race on the shared :stable/:latest
# tags. Don't cancel — let an in-flight publish finish rather than leave a partial
# manifest or a stale :latest pointer.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/yt-dlp-docker
  # Fixed epoch for reproducible builds: combined with rewrite-timestamp on the push
  # step, unchanged layers keep a byte-identical digest across nightly rebuilds and so
  # aren't re-downloaded. Any constant works; 0 is simplest.
  SOURCE_DATE_EPOCH: "0"

jobs:
  build:
    permissions:
      contents: read      # checkout
      packages: write     # push to ghcr
      id-token: write     # cosign keyless OIDC
      attestations: write # provenance + sbom
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { channel: nightly, ytdlp_pre: "--pre", req: "yt-dlp[default,curl-cffi]" }
          - { channel: stable,  ytdlp_pre: "",      req: "yt-dlp[default,curl-cffi]" }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Daily apt cache-bust epoch
        id: apt
        run: echo "epoch=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build amd64 for smoke
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: smoke-amd64:${{ matrix.channel }}
          build-args: |
            YTDLP_PRE=${{ matrix.ytdlp_pre }}
            YTDLP_REQ=${{ matrix.req }}
            APT_EPOCH=${{ steps.apt.outputs.epoch }}
          cache-from: type=gha,scope=${{ matrix.channel }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}-amd64

      - name: Smoke amd64
        run: BUILD=0 IMAGE=smoke-amd64:${{ matrix.channel }} ./test/smoke.sh

      - name: Date tag from the built yt-dlp version
        id: meta
        run: |
          v="$(docker run --rm --entrypoint cat smoke-amd64:${{ matrix.channel }} /IMAGE_VERSION)"
          echo "date=$(echo "$v" | cut -d. -f1-3)" >> "$GITHUB_OUTPUT"

      - name: Build arm64 for smoke (QEMU)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: smoke-arm64:${{ matrix.channel }}
          build-args: |
            YTDLP_PRE=${{ matrix.ytdlp_pre }}
            YTDLP_REQ=${{ matrix.req }}
            APT_EPOCH=${{ steps.apt.outputs.epoch }}
          cache-from: type=gha,scope=${{ matrix.channel }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.channel }}-arm64

      - name: Smoke arm64
        run: BUILD=0 IMAGE=smoke-arm64:${{ matrix.channel }} ./test/smoke.sh

      - name: Trivy scan (amd64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: smoke-amd64:${{ matrix.channel }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan (arm64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: smoke-arm64:${{ matrix.channel }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Build & push multi-arch
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          outputs: type=image,push=true,rewrite-timestamp=true
          tags: |
            ${{ env.IMAGE }}:${{ matrix.channel }}
            ${{ env.IMAGE }}:${{ matrix.channel }}-${{ steps.meta.outputs.date }}
          build-args: |
            YTDLP_PRE=${{ matrix.ytdlp_pre }}
            YTDLP_REQ=${{ matrix.req }}
            APT_EPOCH=${{ steps.apt.outputs.epoch }}
          cache-from: |
            type=gha,scope=${{ matrix.channel }}-amd64
            type=gha,scope=${{ matrix.channel }}-arm64

      - name: Sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.push.outputs.digest }}"

  # Also tag :latest = :stable for discoverability
  alias-latest:
    needs: build
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" "${IMAGE}:stable"
